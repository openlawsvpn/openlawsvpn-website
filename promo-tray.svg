<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 356"
     font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3fb950"/>
    </marker>
    <filter id="menu-shadow" x="-6%" y="-4%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="356" fill="#0d1117"/>

  <!-- Wordmark -->
  <text x="32" y="36" font-size="20" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#e6edf3">open</tspan><tspan fill="#f78166" font-weight="300">|</tspan><tspan fill="#8b949e">aws</tspan><tspan fill="#e6edf3">vpn</tspan>
  </text>
  <text x="32" y="53" font-size="10" fill="#8b949e">v1.0.9 · GNOME system tray via gnome-shell-extension-appindicator</text>

  <!-- State labels -->
  <text x="200" y="74" text-anchor="middle" font-size="10" fill="#8b949e"
        font-weight="600" letter-spacing="0.08em">IDLE</text>
  <text x="560" y="74" text-anchor="middle" font-size="10" fill="#3fb950"
        font-weight="600" letter-spacing="0.08em">CONNECTED</text>

  <!-- ══════════ LEFT: GNOME TOP BAR (idle) ══════════ -->
  <rect x="60" y="80" width="280" height="26" fill="#1c1b1a"/>
  <!-- Tray icons: ♡ en ≈ ◁ 55% -->
  <text x="165" y="98" font-size="15" fill="#d97706">♡</text>
  <text x="183" y="97" font-size="10" fill="#c8c4c0">en</text>
  <text x="202" y="98" font-size="12" fill="#c8c4c0">≈</text>
  <text x="219" y="97" font-size="10" fill="#c8c4c0">◁)</text>
  <text x="238" y="97" font-size="10" fill="#c8c4c0">55%</text>

  <!-- LEFT: menu popup -->
  <g filter="url(#menu-shadow)">
    <rect x="100" y="106" width="222" height="155" rx="10" fill="#27231f"/>
  </g>
  <rect x="100" y="106" width="222" height="155" rx="10" fill="none" stroke="#46413c" stroke-width="0.5"/>

  <!-- Item: Show window -->
  <text x="124" y="134" font-size="13" fill="#ede9e4">Show window</text>

  <!-- Separator 1 -->
  <line x1="108" y1="145" x2="314" y2="145" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: Connect VPN (highlighted) -->
  <rect x="106" y="149" width="210" height="28" rx="6" fill="#3c3733"/>
  <text x="124" y="168" font-size="13" fill="#ede9e4" font-weight="500">Connect VPN</text>

  <!-- Separator 2 -->
  <line x1="108" y1="181" x2="314" y2="181" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: ✓ Launch on Login -->
  <text x="112" y="201" font-size="11" fill="#ede9e4">✓</text>
  <text x="130" y="201" font-size="13" fill="#ede9e4">Launch on Login</text>

  <!-- Separator 3 -->
  <line x1="108" y1="213" x2="314" y2="213" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: Quit -->
  <text x="124" y="241" font-size="13" fill="#ede9e4">Quit</text>

  <!-- Left tray chip -->
  <rect x="106" y="274" width="152" height="20" rx="10" fill="#1f2428" stroke="#30363d" stroke-width="1"/>
  <text x="122" y="288" font-size="14" fill="#d97706">♡</text>
  <text x="139" y="288" font-size="9" fill="#8b949e">System tray · idle</text>

  <!-- ══════════ TRANSITION ARROW ══════════ -->
  <line x1="350" y1="193" x2="444" y2="193"
        stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>
  <text x="397" y="185" text-anchor="middle" font-size="9" fill="#3fb950" font-weight="600">Connect</text>

  <!-- ══════════ RIGHT: GNOME TOP BAR (connected) ══════════ -->
  <rect x="420" y="80" width="280" height="26" fill="#1c1b1a"/>
  <!-- Tray icons: ♥ en ≈ ◁ 55% -->
  <text x="525" y="98" font-size="15" fill="#dc2626">♥</text>
  <text x="543" y="97" font-size="10" fill="#c8c4c0">en</text>
  <text x="562" y="98" font-size="12" fill="#c8c4c0">≈</text>
  <text x="579" y="97" font-size="10" fill="#c8c4c0">◁)</text>
  <text x="598" y="97" font-size="10" fill="#c8c4c0">55%</text>

  <!-- RIGHT: menu popup -->
  <g filter="url(#menu-shadow)">
    <rect x="460" y="106" width="222" height="155" rx="10" fill="#27231f"/>
  </g>
  <rect x="460" y="106" width="222" height="155" rx="10" fill="none" stroke="#46413c" stroke-width="0.5"/>

  <!-- Item: Show window -->
  <text x="484" y="134" font-size="13" fill="#ede9e4">Show window</text>

  <!-- Separator 1 -->
  <line x1="468" y1="145" x2="674" y2="145" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: Disconnect VPN (highlighted) -->
  <rect x="466" y="149" width="210" height="28" rx="6" fill="#3c3733"/>
  <text x="484" y="168" font-size="13" fill="#ede9e4" font-weight="500">Disconnect VPN</text>

  <!-- Separator 2 -->
  <line x1="468" y1="181" x2="674" y2="181" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: ✓ Launch on Login -->
  <text x="472" y="201" font-size="11" fill="#ede9e4">✓</text>
  <text x="490" y="201" font-size="13" fill="#ede9e4">Launch on Login</text>

  <!-- Separator 3 -->
  <line x1="468" y1="213" x2="674" y2="213" stroke="#3d3935" stroke-width="1"/>

  <!-- Item: Quit -->
  <text x="484" y="241" font-size="13" fill="#ede9e4">Quit</text>

  <!-- Right tray chip -->
  <rect x="466" y="274" width="172" height="20" rx="10" fill="#1a2e1a" stroke="#3fb950" stroke-width="1"/>
  <text x="482" y="288" font-size="14" fill="#f78166">♥</text>
  <text x="499" y="288" font-size="9" fill="#3fb950">System tray · connected</text>

  <!-- Caption -->
  <line x1="0" y1="310" x2="760" y2="310" stroke="#21262d" stroke-width="1"/>
  <text x="380" y="330" text-anchor="middle" font-size="11" fill="#8b949e">
    <tspan fill="#e6edf3" font-weight="600">GNOME native tray</tspan>
    <tspan> · AppIndicator · orange ♡ = idle · red ♥ = connected</tspan>
  </text>
  <text x="380" y="347" text-anchor="middle" font-size="9" fill="#6e7681">sudo dnf install gnome-shell-extension-appindicator</text>
</svg>
